<script>
    let msg

    //Função
    function gerarEmail(nome, sobrenome) {
        const dominio = "@senai.br"
        let email = nome.toLowerCase() + sobrenome.toLowerCase() + dominio;
        return email;
    }

    //Nome
    msg = "Digite seu nome"; //Primeira mensagem
    let nome = prompt(msg)
    //let nome = document.getElementById("input-nome");

    //Sobrenome
    msg = "Digite seu sobrenome"; //Segunda mensagem
    let sobrenome = prompt(msg)
    //let sobrenome = document.getElementById("input-sobrenome");

    let emailGerado = gerarEmail(nome, sobrenome)
    alert(emailGerado)
</script>
